aid: amazon-forecast
name: Amazon Forecast
description: >-
  Amazon Forecast is a fully managed service that uses machine learning to
  deliver highly accurate forecasts. It analyzes your historical time-series
  data and automatically selects the right machine learning algorithms to
  generate accurate forecasts with no machine learning expertise required.
