naftiko: 1.0.0-alpha2
info:
  label: Amazon Forecast API — Tags
  description: 'Amazon Forecast API — Tags. 2 operations. Lead operation: List Tags For Resource. Self-contained Naftiko capability
    covering one Amazon Forecast business surface.'
  tags:
  - Amazon Forecast
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_FORECAST_API_KEY: AMAZON_FORECAST_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-forecast-tags
    baseUri: https://forecast.{region}.amazonaws.com
    description: Amazon Forecast API — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tags-resourceArn
      path: /tags/{resourceArn}
      operations:
      - name: listtagsforresource
        method: GET
        description: List Tags For Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          description: ARN of the resource.
          required: true
      - name: tagresource
        method: POST
        description: Tag Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          description: ARN of the resource.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_FORECAST_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-forecast-tags-rest
    port: 8080
    description: REST adapter for Amazon Forecast API — Tags. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tags/{resourcearn}
      name: tags-resourcearn
      description: REST surface for tags-resourceArn.
      operations:
      - method: GET
        name: listtagsforresource
        description: List Tags For Resource
        call: amazon-forecast-tags.listtagsforresource
        with:
          resourceArn: rest.resourceArn
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: tagresource
        description: Tag Resource
        call: amazon-forecast-tags.tagresource
        with:
          resourceArn: rest.resourceArn
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-forecast-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Forecast API — Tags. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-tags-resource
      description: List Tags For Resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-forecast-tags.listtagsforresource
      with:
        resourceArn: tools.resourceArn
      outputParameters:
      - type: object
        mapping: $.
    - name: tag-resource
      description: Tag Resource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-forecast-tags.tagresource
      with:
        resourceArn: tools.resourceArn
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
